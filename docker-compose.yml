services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: express-tsproject:latest
    container_name: express-tsproject-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env.docker

  mongo:
    image: mongo:7
    container_name: express-tsproject-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-minishop}
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
